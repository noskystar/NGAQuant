# 配置文件示例
"""
NGAQuant 配置文件
复制此文件为 config.yaml 并填写实际值
"""

# ==========================================
# API 配置
# ==========================================

# Kimi API (用于情感分析)
kimi:
  api_key: "your_kimi_api_key_here"  # 从 https://platform.moonshot.cn/ 获取
  base_url: "https://api.moonshot.cn/v1"
  model: "kimi-latest"  # 或 kimi-k2-0711

# ==========================================
# 飞书机器人 (用于推送通知)
# ==========================================
feishu:
  webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/xxxxxx"
  # 从飞书群机器人设置中获取

# ==========================================
# NGA 配置
# ==========================================
nga:
  # 可选：Cookie 用于访问需要登录的帖子
  # 从浏览器开发者工具中复制
  cookie: ""
  
  # 请求间隔（秒）
  request_delay: 2
  
  # 超时时间（秒）
  timeout: 30

# ==========================================
# 监控配置
# ==========================================
monitor:
  # 默认检查间隔（秒）
  default_interval: 300  # 5分钟
  
  # 情绪变化阈值（触发通知）
  emotion_change_threshold: 0.15  # 15%
  
  # 最大监控帖子数
  max_threads: 10

# ==========================================
# 分析配置
# ==========================================
analysis:
  # 默认分析页数
  default_max_pages: 5
  
  # 情感分析置信度阈值
  min_confidence: 0.6
  
  # 热门股票显示数量
  top_stocks_limit: 10

# ==========================================
# 回测配置
# ==========================================
backtest:
  # 初始资金
  initial_capital: 100000.0
  
  # 手续费率
  commission_rate: 0.0003  # 万3
  
  # 滑点
  slippage: 0.001  # 0.1%
